name: cashu-fault-lab-cdk

services:
  cdk-mint:
    image: cashubtc/mintd:0.17.3@sha256:39da6a421d0a53a5e7541ea1c7abca3d46265c7dc7980f7fb4c637f089e0b547
    command: ['cdk-mintd', '--work-dir', '/var/lib/cdk-mintd']
    environment:
      CDK_MINTD_URL: http://cdk-mint:8085
      CDK_MINTD_LN_BACKEND: fakewallet
      CDK_MINTD_LISTEN_HOST: 0.0.0.0
      CDK_MINTD_LISTEN_PORT: 8085
      CDK_MINTD_DATABASE: sqlite
      CDK_MINTD_CACHE_BACKEND: memory
      CDK_MINTD_MNEMONIC: abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about
    ports:
      - '127.0.0.1:${CFL_CDK_MINT_PORT:-8085}:8085'
    networks: [cashu-fault-lab-mints]
    volumes:
      - cashu-fault-lab-cdk:/var/lib/cdk-mintd

networks:
  cashu-fault-lab-mints:

volumes:
  cashu-fault-lab-cdk:
