services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: cashu_fault_lab
      POSTGRES_USER: cashu
      POSTGRES_PASSWORD: ${CFL_POSTGRES_PASSWORD:-cashu-local-development-only}
    ports:
      - '127.0.0.1:${CFL_POSTGRES_PORT:-54329}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cashu -d cashu_fault_lab']
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - cashu-fault-lab-postgres:/var/lib/postgresql

volumes:
  cashu-fault-lab-postgres:
