name: cashu-fault-lab-wallets

services:
  nutshell-redis:
    extends:
      file: nutshell.compose.yml
      service: nutshell-redis

  nutshell:
    extends:
      file: nutshell.compose.yml
      service: nutshell
    ports: !reset []
    depends_on:
      nutshell-redis:
        condition: service_healthy

  lab-netns:
    build:
      context: ../..
      dockerfile: infra/docker/wallet-adapters.Dockerfile
      target: lab-netns
    depends_on:
      nutshell:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'nc', '-z', '127.0.0.1', '3338']
      interval: 2s
      timeout: 2s
      retries: 60
    networks: [cashu-fault-lab-mints]
    ports:
      - '127.0.0.1:${CFL_NUTSHELL_PORT:-3338}:3338'
      - '127.0.0.1:${CFL_CASHU_TS_PORT:-4101}:4101'
      - '127.0.0.1:${CFL_CDK_ADAPTER_PORT:-4102}:4102'
      - '127.0.0.1:${CFL_REFERENCE_RECEIVER_PORT:-4200}:4200'
      - '127.0.0.1:${CFL_HTTP_FAULT_GATEWAY_PORT:-4300}:4300'

  reference-receiver:
    build:
      context: ../..
      dockerfile: infra/docker/wallet-adapters.Dockerfile
      target: node-wallets
    command: ['node', 'apps/reference-receiver/dist/bin.js']
    environment:
      CFL_REFERENCE_RECEIVER_CLAIM_KEY: ${CFL_REFERENCE_RECEIVER_CLAIM_KEY:?set CFL_REFERENCE_RECEIVER_CLAIM_KEY}
      CFL_REFERENCE_RECEIVER_CONTROL_TOKEN: ${CFL_REFERENCE_RECEIVER_TOKEN:?set CFL_REFERENCE_RECEIVER_TOKEN}
      CFL_REFERENCE_RECEIVER_HOST: 0.0.0.0
      CFL_REFERENCE_RECEIVER_MINT_URL: http://127.0.0.1:3338
      CFL_REFERENCE_RECEIVER_PAYMENT_TARGET: http://127.0.0.1:4300/pay
      CFL_REFERENCE_RECEIVER_PORT: 4200
    depends_on:
      lab-netns:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4200/v1/capabilities',{headers:{authorization:'Bearer '+process.env.CFL_REFERENCE_RECEIVER_CONTROL_TOKEN}}).then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 2s
      timeout: 2s
      retries: 60
    init: true
    network_mode: service:lab-netns

  http-fault-gateway:
    build:
      context: ../..
      dockerfile: infra/docker/wallet-adapters.Dockerfile
      target: node-wallets
    command: ['node', 'apps/http-fault-gateway/dist/bin.js']
    environment:
      CFL_HTTP_FAULT_GATEWAY_CONTROL_TOKEN: ${CFL_HTTP_FAULT_GATEWAY_TOKEN:?set CFL_HTTP_FAULT_GATEWAY_TOKEN}
      CFL_HTTP_FAULT_GATEWAY_DOWNSTREAM: http://127.0.0.1:4200
      CFL_HTTP_FAULT_GATEWAY_HOST: 0.0.0.0
      CFL_HTTP_FAULT_GATEWAY_PORT: 4300
    depends_on:
      reference-receiver:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4300/__faults/v1/evidence',{headers:{authorization:'Bearer '+process.env.CFL_HTTP_FAULT_GATEWAY_CONTROL_TOKEN}}).then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 2s
      timeout: 2s
      retries: 60
    init: true
    network_mode: service:lab-netns

  cashu-ts:
    build:
      context: ../..
      dockerfile: infra/docker/wallet-adapters.Dockerfile
      target: node-wallets
    command: ['node', 'adapters/cashu-ts/dist/bin.js']
    environment:
      CFL_CASHU_TS_CONTROL_TOKEN: ${CFL_CASHU_TS_TOKEN:?set CFL_CASHU_TS_TOKEN}
      CFL_CASHU_TS_CLAIM_KEY: ${CFL_CASHU_TS_CLAIM_KEY:-ERERERERERERERERERERERERERERERERERERERERERE}
      CFL_CASHU_TS_FUNDING_AMOUNT: ${CFL_WALLET_FUNDING_AMOUNT:-64}
      CFL_CASHU_TS_HOST: 0.0.0.0
      CFL_CASHU_TS_MINT_URL: http://127.0.0.1:3338
      CFL_CASHU_TS_PAYMENT_TARGET: http://127.0.0.1:4101/pay
      CFL_CASHU_TS_PORT: 4101
    depends_on:
      http-fault-gateway:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4101/v1/capabilities',{headers:{authorization:'Bearer '+process.env.CFL_CASHU_TS_CONTROL_TOKEN}}).then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 2s
      timeout: 2s
      retries: 60
    init: true
    network_mode: service:lab-netns

  cdk:
    build:
      context: ../..
      dockerfile: infra/docker/wallet-adapters.Dockerfile
      target: cdk-adapter
    environment:
      CASHU_FAULT_LAB_CDK_FUNDING_AMOUNT: ${CFL_WALLET_FUNDING_AMOUNT:-64}
      CASHU_FAULT_LAB_CDK_FUNDING_TIMEOUT_SECONDS: 30
      CASHU_FAULT_LAB_CDK_LISTEN: 0.0.0.0:4102
      CASHU_FAULT_LAB_CDK_MINT_URL: http://127.0.0.1:3338
      CASHU_FAULT_LAB_CONTROL_TOKEN: ${CFL_CDK_TOKEN:?set CFL_CDK_TOKEN}
    depends_on:
      http-fault-gateway:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl --fail --silent --header "Authorization: Bearer $$CASHU_FAULT_LAB_CONTROL_TOKEN" http://127.0.0.1:4102/v1/capabilities >/dev/null',
        ]
      interval: 2s
      timeout: 2s
      retries: 60
    init: true
    network_mode: service:lab-netns

networks:
  cashu-fault-lab-mints:

volumes:
  cashu-fault-lab-nutshell:
  cashu-fault-lab-redis:
