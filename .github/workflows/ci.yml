name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: 11.15.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Pin Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component rustfmt,clippy
          rustup override set 1.97.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm test:consumer
      - run: pnpm audit --prod
      - run: cargo fmt --manifest-path adapters/cdk/Cargo.toml --check
      - run: cargo clippy --manifest-path adapters/cdk/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path adapters/cdk/Cargo.toml
      - name: Golden fault lanes, ten fixed seeds
        run: |
          for seed in $(seq 0 9); do
            node apps/lab-cli/dist/bin.js run scenarios/retry/response-lost.json --seed "pr-http-${seed}" --sender reference-ts --receiver reference-ts
            node apps/lab-cli/dist/bin.js run scenarios/retry/nostr-response-lost.json --seed "pr-nostr-${seed}" --sender reference-ts --receiver reference-ts
          done
      - run: node apps/lab-cli/dist/bin.js run scenarios/security/redirect-leak.json --seed pr-security
      - run: node apps/lab-cli/dist/bin.js run scenarios/security/malformed-input.json --seed pr-security
      - run: node apps/lab-cli/dist/bin.js matrix --profile delivery-v1

  funded-wallet-matrix:
    name: Funded external wallet matrix
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          version: 11.15.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build lab CLI
        run: pnpm exec turbo run build --filter=@cashu-fault-lab/lab-cli
      - name: Start funded wallet stack
        env:
          CFL_CASHU_TS_TOKEN: lab-only-cashu-ts-token
          CFL_CDK_TOKEN: lab-only-cdk-token
          CFL_REFERENCE_RECEIVER_TOKEN: lab-only-receiver-token
          CFL_HTTP_FAULT_GATEWAY_TOKEN: lab-only-fault-token
          CFL_REFERENCE_RECEIVER_CLAIM_KEY: ERERERERERERERERERERERERERERERERERERERERERE
        run: docker compose -f infra/compose/wallet-adapters.compose.yml up --build -d --wait
      - name: Funded external delivery-v1 matrix
        env:
          CFL_CASHU_TS_TOKEN: lab-only-cashu-ts-token
          CFL_CDK_TOKEN: lab-only-cdk-token
          CFL_REFERENCE_RECEIVER_TOKEN: lab-only-receiver-token
          CFL_HTTP_FAULT_GATEWAY_TOKEN: lab-only-fault-token
          CFL_HTTP_FAULT_GATEWAY_URL: http://127.0.0.1:4300
        run: node apps/lab-cli/dist/bin.js matrix --profile delivery-v1 --adapters spec/examples/adapters.local.json --min-passes 2
      - name: External receiver restart after settlement
        env:
          CFL_CASHU_TS_TOKEN: lab-only-cashu-ts-token
          CFL_CDK_TOKEN: lab-only-cdk-token
          CFL_REFERENCE_RECEIVER_TOKEN: lab-only-receiver-token
          CFL_HTTP_FAULT_GATEWAY_TOKEN: lab-only-fault-token
          CFL_REFERENCE_RECEIVER_CLAIM_KEY: ERERERERERERERERERERERERERERERERERERERERERE
        run: node apps/lab-cli/dist/bin.js run scenarios/crash-recovery/external-receiver-restart-after-settlement.json --seed ci-external-receiver-restart --sender cdk --receiver cashu-ts --adapters spec/examples/adapters.local.json
      - name: Dump funded wallet diagnostics
        if: failure()
        env:
          CFL_CASHU_TS_TOKEN: lab-only-cashu-ts-token
          CFL_CDK_TOKEN: lab-only-cdk-token
          CFL_REFERENCE_RECEIVER_TOKEN: lab-only-receiver-token
          CFL_HTTP_FAULT_GATEWAY_TOKEN: lab-only-fault-token
          CFL_REFERENCE_RECEIVER_CLAIM_KEY: ERERERERERERERERERERERERERERERERERERERERERE
        run: |
          set +e
          compose=(docker compose -f infra/compose/wallet-adapters.compose.yml)
          "${compose[@]}" ps --all
          for service in cashu-ts cashu-ts-postgres cdk lab-netns; do
            container_id="$("${compose[@]}" ps -q "${service}")"
            if [[ -n "${container_id}" ]]; then
              docker inspect --format '{{.Name}} restart_count={{.RestartCount}} state={{json .State}}' "${container_id}"
            fi
          done
          "${compose[@]}" logs --no-color --timestamps cashu-ts cashu-ts-postgres cdk lab-netns
          "${compose[@]}" exec -T cashu-ts-postgres psql -U cashu -d cashu_fault_lab -c "SELECT delivery_id, request_id, phase, receipt->>'status' AS receipt_status, updated_at FROM deliveries ORDER BY updated_at DESC LIMIT 10;"
          "${compose[@]}" exec -T cashu-ts-postgres psql -U cashu -d cashu_fault_lab -c "SELECT (SELECT count(*) FROM deliveries) AS deliveries, (SELECT count(*) FROM merchant_credits) AS merchant_credits, (SELECT count(*) FROM receipt_outbox) AS receipt_outbox;"
      - name: Stop funded wallet stack
        if: always()
        env:
          CFL_CASHU_TS_TOKEN: lab-only-cashu-ts-token
          CFL_CDK_TOKEN: lab-only-cdk-token
          CFL_REFERENCE_RECEIVER_TOKEN: lab-only-receiver-token
          CFL_HTTP_FAULT_GATEWAY_TOKEN: lab-only-fault-token
          CFL_REFERENCE_RECEIVER_CLAIM_KEY: ERERERERERERERERERERERERERERERERERERERERERE
        run: docker compose -f infra/compose/wallet-adapters.compose.yml down -v

  real-mint:
    name: Real mint — ${{ matrix.mint.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        mint:
          - name: Nutshell
            compose_file: infra/compose/nutshell.compose.yml
            url: http://127.0.0.1:3338
          - name: CDK
            compose_file: infra/compose/cdk-mint.compose.yml
            url: http://127.0.0.1:8085
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          version: 11.15.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Pin Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal
          rustup override set 1.97.0
      - run: pnpm install --frozen-lockfile
      - name: Build funded wallet lane
        run: pnpm exec turbo run build --filter=@cashu-fault-lab/scenario-runner
      - name: Build CDK adapter
        run: cargo build --manifest-path adapters/cdk/Cargo.toml
      - name: Start ${{ matrix.mint.name }} fake-wallet mint
        run: docker compose -f "${{ matrix.mint.compose_file }}" up -d
      - name: Wait for ${{ matrix.mint.name }} fake-wallet mint
        run: |
          for i in $(seq 1 60); do
            if curl --fail --silent "${{ matrix.mint.url }}/v1/info" >/dev/null 2>&1; then
              echo "${{ matrix.mint.name }} mint ready"
              exit 0
            fi
            sleep 2
          done
          echo "${{ matrix.mint.name }} mint did not become ready" && exit 1
      - name: Real mint response-loss recovery
        env:
          CFL_REAL_MINT_URL: ${{ matrix.mint.url }}
        run: pnpm --filter @cashu-fault-lab/reference-receiver exec vitest run test/docker-mint-e2e.test.ts
      - name: cashu-ts and CDK delivery faults against ${{ matrix.mint.name }}
        env:
          CFL_REAL_MINT_URL: ${{ matrix.mint.url }}
        run: pnpm --filter @cashu-fault-lab/scenario-runner exec vitest run test/cross-language-docker.test.ts
      - name: Stop ${{ matrix.mint.name }} fake-wallet mint
        if: always()
        run: docker compose -f "${{ matrix.mint.compose_file }}" down -v
