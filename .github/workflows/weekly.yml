name: Weekly

on:
  schedule:
    - cron: '0 4 * * 1' # 4 AM UTC every Monday
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: weekly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stress:
    name: Stress tests
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          version: 11.15.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Pin Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component rustfmt,clippy
          rustup override set 1.97.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: cargo build --manifest-path adapters/cdk/Cargo.toml
      - name: Duplicate storm (1000 seeds + 1000 duplicates)
        run: |
          for seed in $(seq 0 999); do
            node apps/lab-cli/dist/bin.js run scenarios/concurrency/duplicate-storm.json --seed "weekly-dup-${seed}" --sender reference-ts --receiver reference-ts
          done
      - name: Crash recovery stress (500 seeds)
        run: |
          for seed in $(seq 0 499); do
            node apps/lab-cli/dist/bin.js run scenarios/crash-recovery/mint-response-lost.json --seed "weekly-crash-${seed}" --sender reference-ts --receiver reference-ts
          done
      - name: Cross-transport convergence stress (300 seeds)
        run: |
          for seed in $(seq 0 299); do
            node apps/lab-cli/dist/bin.js run scenarios/concurrency/cross-transport-storm.json --seed "weekly-cross-${seed}" --sender reference-ts --receiver reference-ts
          done

  real-mint:
    name: Real mint — ${{ matrix.mint.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        mint:
          - name: Nutshell
            compose_file: infra/compose/nutshell.compose.yml
            url: http://127.0.0.1:3338
          - name: CDK
            compose_file: infra/compose/cdk-mint.compose.yml
            url: http://127.0.0.1:8085
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          version: 11.15.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Pin Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal
          rustup override set 1.97.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec turbo run build --filter=@cashu-fault-lab/scenario-runner
      - run: cargo build --manifest-path adapters/cdk/Cargo.toml
      - name: Start ${{ matrix.mint.name }} fake-wallet mint
        run: docker compose -f "${{ matrix.mint.compose_file }}" up -d
      - name: Wait for ${{ matrix.mint.name }} fake-wallet mint
        run: |
          for i in $(seq 1 60); do
            if curl --fail --silent "${{ matrix.mint.url }}/v1/info" >/dev/null 2>&1; then
              echo "${{ matrix.mint.name }} mint ready"
              exit 0
            fi
            sleep 2
          done
          echo "${{ matrix.mint.name }} mint did not become ready" && exit 1
      - name: Real mint response-loss recovery
        env:
          CFL_REAL_MINT_URL: ${{ matrix.mint.url }}
        run: pnpm --filter @cashu-fault-lab/reference-receiver exec vitest run test/docker-mint-e2e.test.ts
      - name: Cross-language delivery faults against ${{ matrix.mint.name }}
        env:
          CFL_REAL_MINT_URL: ${{ matrix.mint.url }}
        run: pnpm --filter @cashu-fault-lab/scenario-runner exec vitest run test/cross-language-docker.test.ts
      - name: Stop ${{ matrix.mint.name }} fake-wallet mint
        if: always()
        run: docker compose -f "${{ matrix.mint.compose_file }}" down -v

  browser:
    name: Browser CORS lane
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          version: 11.15.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npx playwright install chromium
      - run: pnpm test:browser
