name: Nightly

on:
  schedule:
    - cron: '0 3 * * *' # 3 AM UTC daily
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pairwise-faults:
    name: Pairwise fault combinations
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          version: 11.15.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Pin Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component rustfmt,clippy
          rustup override set 1.97.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: cargo build --manifest-path adapters/cdk/Cargo.toml
      - name: Pairwise fault combinations (100 seeds)
        run: |
          for seed in $(seq 0 99); do
            node apps/lab-cli/dist/bin.js run scenarios/retry/response-lost.json --seed "nightly-http-${seed}" --sender reference-ts --receiver reference-ts
            node apps/lab-cli/dist/bin.js run scenarios/retry/request-lost.json --seed "nightly-req-${seed}" --sender reference-ts --receiver reference-ts
          done
      - name: Cross-transport convergence (50 seeds)
        run: |
          for seed in $(seq 0 49); do
            node apps/lab-cli/dist/bin.js run scenarios/retry/nostr-response-lost.json --seed "nightly-nostr-${seed}" --sender reference-ts --receiver reference-ts
            node apps/lab-cli/dist/bin.js run scenarios/retry/cross-transport-fallback.json --seed "nightly-fallback-${seed}" --sender reference-ts --receiver reference-ts
          done
      - name: Duplicate storms (20 seeds)
        run: |
          for seed in $(seq 0 19); do
            node apps/lab-cli/dist/bin.js run scenarios/concurrency/duplicate-storm.json --seed "nightly-dup-${seed}" --sender reference-ts --receiver reference-ts
            node apps/lab-cli/dist/bin.js run scenarios/concurrency/cross-transport-storm.json --seed "nightly-cross-${seed}" --sender reference-ts --receiver reference-ts
          done
      - name: Crash recovery (30 seeds)
        run: |
          for seed in $(seq 0 29); do
            node apps/lab-cli/dist/bin.js run scenarios/crash-recovery/mint-response-lost.json --seed "nightly-crash-${seed}" --sender reference-ts --receiver reference-ts
          done
      - name: Full matrix
        run: node apps/lab-cli/dist/bin.js matrix --profile delivery-v1

  security:
    name: Security + fuzzing lanes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          version: 11.15.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Security probes
        run: |
          node apps/lab-cli/dist/bin.js run scenarios/security/redirect-leak.json --seed nightly-security
          node apps/lab-cli/dist/bin.js run scenarios/security/ssrf.json --seed nightly-security
          node apps/lab-cli/dist/bin.js run scenarios/security/cors.json --seed nightly-security
          node apps/lab-cli/dist/bin.js run scenarios/security/malformed-input.json --seed nightly-security
      - name: Malformed input (100 random seeds)
        run: |
          for seed in $(seq 0 99); do
            node apps/lab-cli/dist/bin.js run scenarios/security/malformed-input.json --seed "nightly-malform-${seed}"
          done
